name: Clock Out

on:
  schedule:
    # 13:07 UTC = 06:37 PM IST, Monday to Friday
    # (odd minute chosen to avoid GitHub's busy top-of-hour queue delays)
    - cron: "7 13 * * 1-5"
  workflow_dispatch: # allows manual runs from the Actions tab for testing

jobs:
  clock-out:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Adds 0-7 minutes of jitter so clock-out times look natural
      # (skipped on manual runs so testing is instant)
      - name: Random delay
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 420))
          echo "Sleeping for $DELAY seconds..."
          sleep $DELAY

      - name: Run clock-out script
        run: node clock-out.js
        env:
          KEKA_EMAIL: ${{ secrets.KEKA_EMAIL }}
          KEKA_PASSWORD: ${{ secrets.KEKA_PASSWORD }}

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clock-out-failure-screenshot
          path: failure-screenshot.png
          if-no-files-found: ignore
